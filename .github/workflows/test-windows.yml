name: Test Meow Terminal Script on Windows

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install PowerShell 7
        shell: pwsh
        run: |
          Write-Host "Checking PowerShell 7..."
          if (-not (Get-Command pwsh -ErrorAction SilentlyContinue)) {
              Write-Host "PowerShell 7 not found, installing..."
              Invoke-WebRequest -Uri "https://aka.ms/install-powershell.ps1" -OutFile "install-pwsh.ps1"
              Set-ExecutionPolicy Bypass -Scope Process -Force
              ./install-pwsh.ps1
          } else {
              Write-Host "PowerShell 7 already installed"
          }

      - name: Install Chocolatey
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
              Set-ExecutionPolicy Bypass -Scope Process -Force
              [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
              Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          } else {
              Write-Host "Chocolatey already installed"
          }

      - name: Install fastfetch
        shell: pwsh
        run: |
          choco install fastfetch -y
          fastfetch --version

      - name: Run Meow Terminal script in PowerShell 7
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\meow.ps1 > output.txt
          Get-Content output.txt
