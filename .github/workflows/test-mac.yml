name: Test Meow Terminal Script on macOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-test:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Homebrew
        shell: bash
        run: |
          if ! command -v brew >/dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      - name: Install fastfetch
        shell: bash
        run: brew install fastfetch
        
      - name: Install zsh
        shell: bash
        run: brew install zsh

      - name: Run Meow Terminal script in proper zsh
        shell: bash
        run: |
          chmod +x ./zshrcmac.sh
          zsh ./zshrcmac.sh > output.txt
          cat output.txt
